<section class="rounded-3xl border border-white/10 bg-slate-900/80 p-4">
  <div class="mb-4 flex items-center justify-between gap-3">
    <div>
      <h3 class="text-lg font-bold text-white">{{ dia.nome }}</h3>
      <p class="text-xs uppercase tracking-[0.3em] text-slate-500">
        {{ dia.exercicios.length }} exercícios
      </p>
    </div>
  </div>

  <div
    cdkDropList
    [id]="dropListId"
    [cdkDropListData]="dia.exercicios"
    [cdkDropListConnectedTo]="connectedDropLists"
    class="space-y-3 rounded-2xl border border-dashed border-slate-700 bg-slate-950/40 p-3 min-h-[12rem]"
    (cdkDropListDropped)="onDrop($event)"
  >
    <div
      *ngFor="let exercicio of dia.exercicios; trackBy: trackByExercicio"
      cdkDrag
      class="rounded-2xl border border-white/10 bg-slate-900 px-4 py-3"
    >
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="font-semibold text-white">{{ exercicio.nome }}</p>
          <p class="text-sm text-cyan-300">{{ exercicio.musculo }}</p>
        </div>
        <button
          type="button"
          class="flex p-1 items-center justify-center rounded-md border border-rose-400/30 bg-rose-400/10 text-lg font-semibold text-rose-200 transition hover:bg-rose-400/20"
          (click)="onRemove(exercicio.uid)"
        >
          <ng-icon name="heroTrash"></ng-icon>
        </button>
      </div>

      <div class="mt-4 grid grid-cols-2 gap-3">
        <label class="block">
          <span
            class="mb-2 block text-xs uppercase tracking-[0.25em] text-slate-500"
          >
            Séries
          </span>
          <input
            type="number"
            min="1"
            [(ngModel)]="exercicio.series"
            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100 outline-none focus:border-cyan-400"
          />
        </label>
        <label class="block">
          <span
            class="mb-2 block text-xs uppercase tracking-[0.25em] text-slate-500"
          >
            Reps
          </span>
          <input
            type="number"
            min="1"
            [(ngModel)]="exercicio.repeticoes"
            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100 outline-none focus:border-cyan-400"
          />
        </label>
      </div>
    </div>

    <p
      *ngIf="!dia.exercicios.length"
      class="py-8 text-center text-sm text-slate-500"
    >
      Arraste exercícios para este dia.
    </p>
  </div>
</section>
