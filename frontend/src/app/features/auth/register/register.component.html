<section
  class="flex min-h-screen items-center justify-center bg-[radial-gradient(circle_at_top_right,_rgba(34,197,94,0.18),_transparent_32%),linear-gradient(135deg,_#020617,_#111827_50%,_#052e16)] px-6 py-10"
>
  <div
    class="w-full max-w-xl rounded-3xl border border-white/10 bg-slate-900/75 p-8 shadow-2xl shadow-emerald-950/30 backdrop-blur sm:p-10"
  >
    <p class="text-sm uppercase tracking-[0.35em] text-emerald-300">
      Novo acesso
    </p>
    <h1 class="mt-4 text-4xl font-black text-white">Crie sua conta</h1>
    <p class="mt-3 text-sm text-slate-400">
      O cadastro libera o acesso ao builder de treino protegido por JWT.
    </p>

    <form class="mt-8 space-y-5" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-200" for="name">
          Nome
        </label>
        <input
          id="name"
          type="text"
          formControlName="name"
          class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none transition focus:border-emerald-400"
          placeholder="Seu nome"
        />
      </div>

      <div>
        <label
          class="mb-2 block text-sm font-medium text-slate-200"
          for="register-email"
        >
          E-mail
        </label>
        <input
          id="register-email"
          type="email"
          formControlName="email"
          class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none transition focus:border-emerald-400"
          placeholder="voce@exemplo.com"
        />
      </div>

      <div>
        <label
          class="mb-2 block text-sm font-medium text-slate-200"
          for="register-password"
        >
          Senha
        </label>
        <input
          id="register-password"
          type="password"
          formControlName="password"
          class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none transition focus:border-emerald-400"
          placeholder="Crie uma senha segura"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-2xl bg-emerald-400 px-4 py-3 font-semibold text-slate-950 transition hover:bg-emerald-300 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Salvando...' : 'Cadastrar' }}
      </button>
    </form>

    <p class="mt-6 text-sm text-slate-400">
      Ja possui conta?
      <a
        routerLink="/login"
        class="font-semibold text-emerald-300 hover:text-emerald-200"
      >
        Fazer login
      </a>
    </p>
  </div>
</section>
